    <main class="budget-page">
    <section class="budget-container">
        <h1>Trip Budget Planner</h1>
        <p>Estimate your expenses and see your budget status.</p>

        <div class="budget-wrapper">
            
            <form id="budget-form" class="budget-form">
                <div class="input-group">
                    <label for="dest-name">Destination</label>
                    <input type="text" id="dest-name" placeholder="e.g. Tokyo" required>
                </div>
                <div class="input-group">
                    <label for="num-days">Number of Days</label>
                    <input type="number" id="num-days" min="1" placeholder="e.g. 7" required>
                </div>
                <div class="input-group">
                    <label for="daily-budget">Daily Budget ($)</label>
                    <input type="number" id="daily-budget" min="1" placeholder="e.g. 100" required>
                </div>
                <button type="submit" class="btn-primary">Calculate Budget</button>
            </form>

            
            <div id="budget-results" class="results-area" style="display: none;">
                <h2>Estimated Total: <span id="total-cost">$0</span></h2>
                <p>Budget Status: <strong id="budget-status">-</strong></p>
                
                <!-- VISUAL OUTPUT: Progress Bar -->
                <div class="progress-container">
                    <div id="budget-progress" class="progress-bar"></div>
                </div>

                <button id="save-budget-btn" class="btn-secondary">Save Budget to Profile</button>
            </div>
        </div>

        
        <section class="saved-budgets">
            <h3>Your Saved Budgets</h3>
            <div id="saved-budgets-list" class="budgets-list">
                <!-- Saved budgets will be injected here by JS -->
                <p class="empty-msg">No saved budgets yet.</p>
            </div>
        </section>
    </section>
</main>
