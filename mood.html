        <p>Set the vibe and track your journey.</p>

        
        <div class="sound-board">
            <h2>Ambient Sounds</h2>
            <div class="sound-buttons">
                <button class="sound-btn" data-sound="beach">🏖️ Beach</button>
                <button class="sound-btn" data-sound="forest">🌲 Forest</button>
                <button class="sound-btn" data-sound="city">🏙️ City</button>
                <button class="sound-btn" id="stop-sound">🔇 Stop All</button>
            </div>
            <p id="sound-status">Currently: Silence</p>
        </div>

        
        <div class="trip-tracker">
            <h3>My Travel Journey</h3>
            <p>Mark destinations as planned or visited.</p>

            </div>
